    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827; /* Dark background */
            /* Subtle background pattern */
            background-image: radial-gradient(#374151 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .header-gradient {
            background: linear-gradient(90deg, #4f46e5, #a855f7);
        }
        .course-card {
            background-color: #1f2937; /* Darker card background */
            border-radius: 0.75rem;
            border: 1px solid #374151;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            display: block;
            position: relative;
            overflow: hidden;
            opacity: 0; /* Initially hidden for animation */
            animation: fadeIn 0.5s ease-out forwards;
        }
        .course-card:hover {
            transform: translateY(-8px);
        }
        /* Backlight effect on hover */
        .course-card:hover::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: conic-gradient(
                transparent,
                var(--glow-color),
                transparent 30%
            );
            animation: rotate 4s linear infinite;
        }
        .card-content {
            position: relative;
            z-index: 1;
            background-color: #1f2937;
            border-radius: 0.75rem;
            margin: 1px; /* To allow the pseudo-element border to show */
            padding: 1.5rem;
            height: calc(100% - 2px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body class="text-gray-200">

        ];

        const courseGrid = document.getElementById('course-grid');

        courses.forEach((course, index) => {
            const cardLink = document.createElement('a');
            cardLink.href = `./${course.id}.html`;
            cardLink.className = 'course-card';
            cardLink.style.setProperty('--glow-color', course.color);
            cardLink.style.animationDelay = `${index * 100}ms`;

            cardLink.innerHTML = `
                <div class="card-content">
                    <div>
                        <div class="mb-4" style="color: ${course.color};">
                            ${course.icon}
                        </div>
                        <h3 class="text-xl font-bold text-gray-100">${course.title}</h3>
                    </div>
                    <p class="text-gray-400 mt-2">The fundamental concepts for ${course.title.toLowerCase()}.</p>
                </div>
            `;
            courseGrid.appendChild(cardLink);
        });
